<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#23120b">
    <title>You Okay?</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-background">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
    </div>

    <div class="app-container" id="app-container">
        <aside class="sidebar">
            <div class="sidebar-top-fixed">
                <div class="sidebar-header">
                    <div class="brand">
                        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            <line x1="9" y1="7" x2="15" y2="7"></line>
                            <line x1="9" y1="11" x2="15" y2="11"></line>
                        </svg>
                        <span>You Okay?</span>
                    </div>
                    <div class="sidebar-actions">
                        <button id="btn-import" class="btn-icon" title="Import Note">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </button>
                        <input type="file" id="input-import-file" accept=".txt,.json" class="hidden">
                        <button id="btn-new-note" class="btn-primary" title="New Note">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            <span>New</span>
                        </button>
                    </div>
                </div>

                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search notes...">
                </div>

                <div class="nav-filters">
                    <button class="filter-btn active" data-filter="all">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <span>All Notes</span>
                        <span id="count-all" class="badge">0</span>
                    </button>
                    <button class="filter-btn" data-filter="pinned">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="17" x2="12" y2="22"></line>
                            <path d="M5 17h14l-1.5-6h-11z"></path>
                            <path d="M9 11V4a3 3 0 0 1 6 0v7"></path>
                        </svg>
                        <span>Pinned</span>
                        <span id="count-pinned" class="badge">0</span>
                    </button>
                </div>

                <div class="section-header" id="folders-header">
                    <div class="section-title-group" id="folders-toggle">
                        <svg class="icon-xs chevron-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                        <span class="section-title">Folders</span>
                    </div>
                    <button id="btn-add-folder" class="btn-icon-xs" title="New Folder">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>

                <div id="folders-list" class="folders-list"></div>

                <div class="notes-list-header">
                    <span class="list-title">Notes</span>
                    <div class="custom-dropdown" id="sort-dropdown">
                        <button id="sort-dropdown-btn" class="dropdown-trigger">
                            <span id="sort-selected-label">Newest</span>
                            <svg class="icon-sm chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div id="sort-dropdown-menu" class="dropdown-menu hidden">
                            <div class="dropdown-item active" data-value="updated-desc">
                                <svg class="icon-sm check-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Newest</span>
                            </div>
                            <div class="dropdown-item" data-value="updated-asc">
                                <svg class="icon-sm check-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Oldest</span>
                            </div>
                            <div class="dropdown-item" data-value="title-asc">
                                <svg class="icon-sm check-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span>Title A-Z</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="notes-list" class="notes-list"></div>
        </aside>

        <main class="editor-area">
            <div id="editor-wrapper" class="editor-wrapper">
                <div class="editor-top-fixed">
                    <header class="editor-header">
                        <div class="header-left">
                            <button id="btn-back" class="btn-icon mobile-only" title="Back">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <div class="editor-status">
                                <span id="save-status" class="status-indicator">
                                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                        <polyline points="7 3 7 8 15 8"></polyline>
                                    </svg>
                                    <span id="status-text">Saved</span>
                                </span>
                            </div>
                        </div>

                        <div class="editor-actions">
                            <button id="btn-pin" class="btn-icon" title="Pin Note">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="17" x2="12" y2="22"></line>
                                    <path d="M5 17h14l-1.5-6h-11z"></path>
                                    <path d="M9 11V4a3 3 0 0 1 6 0v7"></path>
                                </svg>
                            </button>
                            <button id="btn-export" class="btn-icon" title="Export Note">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                            </button>
                            <button id="btn-delete" class="btn-icon btn-danger" title="Delete Note">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                    </header>

                    <input type="text" id="note-title" class="input-title" placeholder="Note Title..." spellcheck="false">
                    
                    <div class="editor-meta">
                        <span id="note-date">Updated: -</span>
                        <span class="meta-divider">•</span>
                        <span id="stats-counter">0 words, 0 characters</span>
                        <span class="meta-divider">•</span>
                        
                        <div class="custom-dropdown" id="folder-dropdown">
                            <button id="folder-dropdown-btn" class="folder-select-trigger">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                                </svg>
                                <span id="folder-selected-label">Uncategorized</span>
                                <svg class="icon-sm chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                            <div id="folder-dropdown-menu" class="dropdown-menu hidden"></div>
                        </div>
                    </div>
                </div>

                <div class="editor-scroll-body">
                    <textarea id="note-body" class="input-body" placeholder="Start typing your note here..." spellcheck="false"></textarea>
                </div>
            </div>

            <div id="empty-state" class="empty-state hidden">
                <div class="empty-illustration">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                    </svg>
                </div>
                <h3>No Note Selected</h3>
                <p>Select a note from the list or create a new one.</p>
                <button id="btn-empty-new" class="btn-primary">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Create New Note</span>
                </button>
            </div>
        </main>
    </div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <div id="modal-icon-container" class="modal-icon"></div>
                <h4 id="modal-title">Confirm Delete</h4>
            </div>
            <div class="modal-body">
                <p id="modal-message">Are you sure you want to delete this? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" class="btn-secondary">Cancel</button>
                <button id="modal-confirm-btn" class="btn-danger-fill">Delete</button>
            </div>
        </div>
    </div>

    <div id="custom-input-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <h4 id="input-modal-title">New Folder</h4>
            </div>
            <div class="modal-body">
                <input type="text" id="input-modal-field" class="modal-text-input" placeholder="Folder name..." spellcheck="false">
            </div>
            <div class="modal-footer">
                <button id="input-modal-cancel-btn" class="btn-secondary">Cancel</button>
                <button id="input-modal-confirm-btn" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
